on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"

      - name: Build script
        run: scripts/buildprod.sh

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: docker build --platform linux/amd64 -t notely:latest .

      - name: Tag image
        run: docker tag notely:latest ${{ secrets.AWS_ECR_URI }}/${{ secrets.AWS_DOCKER_REPO_NAME }}:latest

      - name: Push image
        run: docker push ${{ secrets.AWS_ECR_URI }}/${{ secrets.AWS_DOCKER_REPO_NAME }}:latest

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
          --task-definition ${{ secrets.AWS_TASK_DEFINITION }} \
          --query taskDefinition \
          > task-definition.json

      - name: Render ECS task definition
        id: render-task
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ secrets.AWS_CONTAINER_NAME }}
          image: ${{ secrets.AWS_ECR_URI }}/${{ secrets.AWS_DOCKER_REPO_NAME }}:latest

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task.outputs.task-definition }}
          service: ${{ secrets.AWS_ECS_SERVICE_NAME }}
          cluster: ${{ secrets.AWS_ECS_CLUSTER_NAME }}
          wait-for-service-stability: true
